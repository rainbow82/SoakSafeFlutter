name: soaksafe
description: SoakSafe — pool maintenance tracker for iOS and Android.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  go_router: ^14.8.1
  provider: ^6.1.2
  shared_preferences: ^2.5.3
  local_auth: ^2.3.0
  intl: ^0.20.2
  pdf: ^3.11.3
  printing: ^5.14.2
  share_plus: ^10.1.4
  file_picker: ^8.1.7
  image_picker: ^1.1.2
  pointycastle: ^3.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/bg_home_pool.jpg
