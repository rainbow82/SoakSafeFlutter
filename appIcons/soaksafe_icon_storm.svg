  <ellipse cx="180" cy="146" rx="3" ry="6" fill="#90CAF9" opacity="0.6"/>
  <ellipse cx="80" cy="158" rx="3" ry="6" fill="#90CAF9" opacity="0.5"/>
  <ellipse cx="158" cy="160" rx="3" ry="6" fill="#90CAF9" opacity="0.5"/>
  <!-- Murky pool -->
  <rect x="20" y="180" width="200" height="8" rx="2" fill="#455A64"/>
  <rect x="20" y="187" width="200" height="38" rx="0" fill="#2E7D32" opacity="0.75"/>
