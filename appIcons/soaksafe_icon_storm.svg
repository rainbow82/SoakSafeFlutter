  <path d="M92 58 Q100 52 108 58" fill="none" stroke="#37474F" stroke-width="3" stroke-linecap="round"/>
  <path d="M122 58 Q130 52 138 58" fill="none" stroke="#37474F" stroke-width="3" stroke-linecap="round"/>
