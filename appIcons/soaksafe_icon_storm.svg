  <circle cx="70" cy="78" r="30" fill="#78909C"/>
  <circle cx="104" cy="62" r="36" fill="#78909C"/>
  <circle cx="146" cy="70" r="30" fill="#78909C"/>
  <circle cx="176" cy="80" r="22" fill="#78909C"/>
  <rect x="44" y="82" width="148" height="32" fill="#78909C"/>
