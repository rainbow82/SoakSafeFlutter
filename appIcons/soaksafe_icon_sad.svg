  <line x1="144" y1="62" x2="152" y2="52" stroke="#F5C842" stroke-width="6" stroke-linecap="round"/>
  <line x1="76" y1="62" x2="68" y2="52" stroke="#F5C842" stroke-width="6" stroke-linecap="round"/>
